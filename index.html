  <meta charset="UTF-8">
  <title>ADZM Finds | Galaxy Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #02040a;
      --accent-blue: #00d1ff;
      --galaxy-vibe: linear-gradient(135deg, #050a1f 0%, #1a0033 50%, #001a3d 100%);
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(0, 209, 255, 0.2);
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-dark);
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* FOND GALAXIE ANIME */
    #galaxy-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--galaxy-vibe);
      z-index: -1;
    }

    .nebula {
      position: absolute; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.15), transparent 60%);
      filter: blur(100px);
      animation: pulse 10s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.5; }
      to { transform: scale(1.2); opacity: 0.8; }
    }

    canvas#starfield {
      position: absolute; top: 0; left: 0;
    }

    /* HEADER & NAV */
    .header {
      position: sticky; top:0; background: rgba(2, 4, 10, 0.7);
      backdrop-filter: blur(20px); display: flex; justify-content: space-between; 
      align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--border); z-index: 1000;
    }
    .logo { font-weight: 800; font-size: 22px; }
    .logo span { color: var(--accent-blue); }

    /* BANNER */
    .banner { text-align: center; padding: 20px; position: relative; z-index: 10; }
    .main-title { color: var(--accent-blue); font-weight: 800; font-size: 15px; text-transform: uppercase; }
    .warning { color: #ff4d4d; font-size: 10px; font-weight: 600; display: block; margin-top: 5px; opacity: 0.8; }

    /* RECHERCHE & TRI */
    .controls {
      padding: 10px 20px; display: flex; gap: 10px; max-width: 1200px; margin: auto;
      position: relative; z-index: 10;
    }
    .search-input {
      flex: 2; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--glass); color: white; outline: none; backdrop-filter: blur(5px);
    }
    .sort-select {
      flex: 1; background: #0a1a2e; color: white; border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; cursor: pointer;
    }

    /* GRID & CARDS APLATIES */
    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 15px; padding: 15px; max-width: 1200px; margin: auto;
      position: relative; z-index: 5;
    }
    .card {
      background: rgba(10, 26, 46, 0.4); border-radius: 15px;
      overflow: hidden; border: 1px solid var(--border);
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
    }
    .card:hover { transform: scale(1.02); border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(0, 209, 255, 0.2); }
    .card img { width: 100%; height: 130px; object-fit: cover; opacity: 0.9; }
    
    .card-body { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .card-body .name { font-weight: 600; font-size: 12px; color: #e0e0e0; }
    .card-body .price { color: var(--accent-blue); font-weight: 800; font-size: 14px; }

    /* POPUP ANCIEN STYLE */
    .popup-overlay { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
      display: none; align-items: center; justify-content: center; z-index: 9999; 
    }
    .popup-content { 
      background: #0a1a2e; color: white; width: 85%; max-width: 350px; 
      padding: 35px 20px; border-radius: 20px; text-align: center; border: 2px solid var(--accent-blue);
    }
    .btn-cyan { 
      display: inline-block; margin-top: 20px; padding: 14px 30px; 
      border-radius: 10px; font-weight: 800; text-decoration: none; 
      background: #00d1ff; color: #000; text-transform: uppercase;
    }

    @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } .card img { height: 160px; } }
  </style>
</head>

  let currentTab = 'articles';
  let articles = [];
  let vendeurs = [];

  function toggleMenu() {
    const m = document.getElementById('mobileMenu');
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
  }

  function switchTab(t) {
    currentTab = t;
    document.getElementById('searchInput').value = ''; // Efface la recherche
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.getElementById(t).style.display = 'block';
    toggleMenu();
    renderAll();
  }

  function addArticle(name, price, image, link){
    articles.push({name, price: parseFloat(price), image, link, id: articles.length});
    renderArticles();
  }

  function renderArticles(){
    const grid = document.getElementById('articleGrid');
    const filter = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortOption').value;
    grid.innerHTML = '';
    
    let filtered = articles.filter(a => a.name.toLowerCase().includes(filter));

    if(sort === 'recent') filtered.sort((a,b) => b.id - a.id);
    else if(sort === 'oldest') filtered.sort((a,b) => a.id - b.id);
    else if(sort === 'low') filtered.sort((a,b) => a.price - b.price);
    else if(sort === 'high') filtered.sort((a,b) => b.price - a.price);

    filtered.forEach(a => {
      grid.innerHTML += `
      <div class="card" onclick="window.open('${a.link}','_blank')">
        <img src="${a.image}">
        <div class="card-body">
          <div><span class="name">${a.name}</span><br><span class="price">${a.price.toFixed(2)} €</span></div>
          <div style="color:var(--accent-blue); font-size:18px;">→</div>
        </div>
      </div>`;
    });
  }

  function addVendeur(n,i,l){ vendeurs.push({name:n, image:i, link:l}); renderVendeurs(); }
  function renderVendeurs(){
    const grid = document.getElementById('vendeurGrid');
    const filter = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = '';
    vendeurs.filter(v => v.name.toLowerCase().includes(filter)).forEach(v => {
      grid.innerHTML += `
      <div class="card" onclick="window.open('${v.link}','_blank')">
        <img src="${v.image}">
        <div class="card-body"><span class="name">${v.name}</span><div style="color:var(--accent-blue)">→</div></div>
      </div>`;
    });
  }

  function renderAll() { if(currentTab==='articles') renderArticles(); else renderVendeurs(); }

  // POPUP LOGIC
  function closePopup() {
    if(document.getElementById("noMore").checked) localStorage.setItem("hideGalaxyPop", "true");
    document.getElementById("popupHipo").style.display = "none";
  }

  // ANIMATION ETOILES FILANTES
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<100; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 3 + 1,
        speed: Math.random() * 1.5 + 0.5
      });
    }
  }

  function drawStars() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    stars.forEach(s => {
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x, s.y + s.length);
      s.y += s.speed;
      if(s.y > canvas.height) s.y = -10;
    });
    ctx.stroke();
    requestAnimationFrame(drawStars);
  }

  window.onload = () => {
    initStars(); drawStars();
    if(localStorage.getItem("hideGalaxyPop") !== "true") {
      setTimeout(() => { document.getElementById("popupHipo").style.display = "flex"; }, 1500);
    }
  };
</script>
