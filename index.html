<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ADZM Finds | Galaxy Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #02040a;
      --accent-blue: #4da6ff;
      --galaxy-vibe: linear-gradient(135deg, #050a1f 0%, #1a0033 50%, #001a3d 100%);
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(77, 166, 255, 0.2);
    }

    body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: var(--bg-dark); color: #fff; overflow-x: hidden; min-height: 100vh; }
    #galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--galaxy-vibe); z-index: -1; }
    canvas#starfield { position: absolute; top: 0; left: 0; }

    /* HEADER & NAV */
    .header { position: sticky; top:0; background: rgba(15, 22, 41, 0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--border); z-index: 1000; }
    .logo { font-weight: 800; font-size: 22px; color: var(--accent-blue); }
    .search-input { flex: 1; margin: 0 15px; padding: 10px 15px; border-radius: 25px; border: 1px solid var(--border); background: #111a30; color: white; outline: none; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; position: relative; z-index: 5; }
    .card { background: rgba(17, 26, 48, 0.6); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; backdrop-filter: blur(10px); cursor: pointer; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,123,255,0.3); }
    .card img { width: 100%; height: 150px; object-fit: cover; }
    .card-body { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .card-body .name { font-weight: 600; font-size: 13px; }
    .card-body .price { color: var(--accent-blue); font-weight: 800; }

    /* =========================================
       LE POPUP EXACT QUE TU AS DEMANDÉ
    ========================================= */
    .hipo-overlay {
      position: fixed;
      inset: 0;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.65);
      display: none; /* Changé de flex à none pour le JS */
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    .hipo-popup {
      background: linear-gradient(145deg, #111, #0a0a0a);
      color: white;
      width: 92%;
      max-width: 420px;
      padding: 35px 25px;
      border-radius: 25px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      transform: translateY(40px);
      opacity: 0;
      animation: slideUp 0.7s ease forwards 0.2s;
    }

    .hipo-tag { font-size: 11px; letter-spacing: 4px; color: #4da6ff; margin-bottom: 15px; }
    .hipo-popup h2 { font-size: 24px; margin-bottom: 15px; line-height: 1.3; font-weight: 800; }
    .hipo-text { font-size: 14px; color: #bbb; margin-bottom: 30px; }
    
    .hipo-btn {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #007bff, #00c6ff);
      box-shadow: 0 0 20px rgba(0,123,255,0.4);
      transition: 0.3s ease;
    }
    .hipo-btn:hover { transform: scale(1.06); box-shadow: 0 0 30px rgba(0,123,255,0.6); }
    
    .hipo-close { position: absolute; top: 15px; right: 18px; background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
    .hipo-checkbox { display: block; margin-top: 25px; font-size: 13px; color: #888; cursor: pointer; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

<div id="galaxy-bg"><canvas id="starfield"></canvas></div>

<header class="header">
  <div class="logo">ADZM Finds</div>
  <input type="text" id="searchInput" class="search-input" placeholder="🔍 Rechercher..." onkeyup="renderArticles()">
  <div style="color:var(--accent-blue); font-size:24px; cursor:pointer;">&#9776;</div>
</header>

<div id="articleGrid" class="grid"></div>

<div id="hipoOverlay" class="hipo-overlay">
  <div class="hipo-popup">
    <button class="hipo-close" onclick="closeHipo()">✕</button>
    <p class="hipo-tag">EXCLUSIF HIPOBUY</p>
    <h2>Inscris-toi et obtiens des<br>codes promo exclusifs</h2>
    <p class="hipo-text">Crée ton compte Hipobuy pour débloquer des réductions et des avantages réservés aux membres.</p>
    <a href="https://m.hipobuy.com/pages/register/index?inviteCode=E6EMQHWWA" target="_blank" class="hipo-btn">S'inscrire sur Hipobuy</a>
    <label class="hipo-checkbox"><input type="checkbox" id="hipoDontShow"> Ne plus afficher</label>
  </div>
</div>

<script>
  let articles = [
    {name: "Pull Nike Tech", price: 16.00, image: "https://i.imgur.com/glqnO1W.jpeg", link: "https://hipobuy.com/pages/goods/details?id=915958135358&channel=1688&inviteCode=E6EMQHWWA"},
    {name: "T-shirt Nike Running", price: 5.00, image: "https://i.imgur.com/vUvVsy1.jpeg", link: "https://hipobuy.com/pages/goods/details?id=979095603924&channel=1688&inviteCode=E6EMQHWWA"}
    // Ajoute tes 100+ articles ici comme avant
  ];

  function renderArticles() {
    const grid = document.getElementById('articleGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = articles.filter(a => a.name.toLowerCase().includes(search)).map(a => `
      <div class="card" onclick="window.open('${a.link}','_blank')">
        <img src="${a.image}">
        <div class="card-body">
          <div><div class="name">${a.name}</div><div class="price">${a.price.toFixed(2)} €</div></div>
          <div style="color:var(--accent-blue)">➡️</div>
        </div>
      </div>
    `).join('');
  }

  // FONCTION FERMETURE POPUP
  function closeHipo() {
    if(document.getElementById("hipoDontShow").checked) {
      localStorage.setItem("hideHipoPopup", "true");
    }
    document.getElementById("hipoOverlay").style.display = "none";
  }

  // ANIMATION ETOILES
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function initStars() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, d: Math.random()*0.5+0.2});
  }
  function drawStars() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y += s.d; if(s.y > canvas.height) s.y = 0; });
    requestAnimationFrame(drawStars);
  }

  window.onload = () => {
    initStars(); drawStars(); renderArticles();
    // Affichage du popup avec délai
    if(localStorage.getItem("hideHipoPopup") !== "true") {
      setTimeout(() => { document.getElementById("hipoOverlay").style.display = "flex"; }, 1500);
    }
  };
</script>
</body>
</html>
